# Hextra Theme Configuration
baseURL: "https://wiltonpaulo.com/"
title: "Wilton Paulo"
theme: "hextra"

# Language settings
defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1

# Markup settings for Hextra
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# Menu configuration (Standard Hextra)
menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Blog
      pageRef: /post
      weight: 2
    - name: About
      pageRef: /about
      weight: 3
    - name: Search
      weight: 10
      params:
        type: search
    - name: Theme
      weight: 20
      params:
        type: theme-toggle

# Theme Parameters
params:
  author:
    name: "Wilton Paulo"
    email: "wiltonpaulo@gmail.com"
  description: "DevOps, Cloud, and Infrastructure Blog"
  
  navbar:
    displayTitle: true
    displayLogo: false
    width: normal

  theme:
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: normal

  search:
    enable: true
    type: flexsearch

  blog:
    mainSections: ["post"]

taxonomies:
  tag: tags
  category: categories
  series: series
